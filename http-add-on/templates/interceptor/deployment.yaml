apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: interceptor
    app.kubernetes.io/name: http-add-on
    {{- include "keda-http-add-on.labels" . | indent 4 }}
  name: {{ .Chart.Name }}-interceptor
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: interceptor
      app.kubernetes.io/name: http-add-on
      {{- include "keda-http-add-on.matchLabels" . | indent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: interceptor
        app.kubernetes.io/name: http-add-on
        {{- include "keda-http-add-on.labels" . | indent 8 }}
      annotations:
        {{- with .Values.interceptor.podAnnotations }}
        {{- range $key, $value := . }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
        {{- end }}
    spec:
      imagePullSecrets: 
        {{- toYaml .Values.interceptor.imagePullSecrets | nindent 8 }}
      serviceAccountName: {{ .Chart.Name }}-interceptor
      {{- if .Values.podSecurityContext.interceptor }}
      securityContext:
      {{- toYaml .Values.podSecurityContext.interceptor | nindent 8 }}
      {{- else }}
      securityContext:
      {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
      - args:
        - "--zap-log-level={{ .Values.logging.interceptor.level }}"
        - "--zap-encoder={{ .Values.logging.interceptor.format }}"
        - "--zap-time-encoding={{ .Values.logging.interceptor.timeEncoding }}"
        {{- if .Values.logging.interceptor.stackTracesEnabled }}
        - "--zap-stacktrace-level=error"
        {{- end }}
        image: "{{ .Values.images.interceptor }}:{{ .Values.images.tag | default .Chart.AppVersion }}"
        imagePullPolicy: '{{ .Values.interceptor.pullPolicy | default "Always" }}'
        name: "{{ .Chart.Name }}-interceptor"
        env:
        - name: KEDA_HTTP_PROXY_PORT
          value: "{{ .Values.interceptor.proxy.port }}"
        - name: KEDA_HTTP_ADMIN_PORT
          value: "{{ .Values.interceptor.admin.port }}"
        {{- with .Values.interceptor.requestTimeout }}
        - name: KEDA_HTTP_REQUEST_TIMEOUT
          value: "{{ . }}"
        {{- end }}
        {{- with .Values.interceptor.responseHeaderTimeout }}
        - name: KEDA_HTTP_RESPONSE_HEADER_TIMEOUT
          value: "{{ . }}"
        {{- end }}
        {{/* TODO(v1): remove waitTimeout fallback */}}
        {{- with (.Values.interceptor.readinessTimeout | default .Values.interceptor.replicas.waitTimeout) }}
        - name: KEDA_HTTP_READINESS_TIMEOUT
          value: "{{ . }}"
        {{- end }}
        {{- with .Values.interceptor.tcpConnectTimeout }}
        - name: KEDA_HTTP_CONNECT_TIMEOUT
          value: "{{ . }}"
        {{- end }}
        - name: KEDA_HTTP_FORCE_HTTP2
          value: "{{ .Values.interceptor.forceHTTP2 }}"
        - name: KEDA_HTTP_MAX_IDLE_CONNS
          value: "{{ .Values.interceptor.maxIdleConns }}"
        - name: KEDA_HTTP_MAX_IDLE_CONNS_PER_HOST
          value: "{{ .Values.interceptor.maxIdleConnsPerHost }}"
        {{- if .Values.interceptor.tls.enabled }}
        - name: KEDA_HTTP_PROXY_TLS_ENABLED
          value: "true"
        - name: KEDA_HTTP_PROXY_TLS_CERT_PATH
          value: "{{ if hasKey .Values.interceptor.tls "cert_path" }}{{ .Values.interceptor.tls.cert_path }}{{ else }}{{ .Values.interceptor.tls.certPath }}{{ end }}"
        - name: KEDA_HTTP_PROXY_TLS_KEY_PATH
          value: "{{ if hasKey .Values.interceptor.tls "key_path" }}{{ .Values.interceptor.tls.key_path }}{{ else }}{{ .Values.interceptor.tls.keyPath }}{{ end }}"
        - name: KEDA_HTTP_PROXY_TLS_PORT
          value: "{{ .Values.interceptor.tls.port }}"
        - name: KEDA_HTTP_PROXY_TLS_SKIP_VERIFY
          value: "{{ if hasKey .Values.interceptor.tls "skip_verify" }}{{ .Values.interceptor.tls.skip_verify }}{{ else }}{{ .Values.interceptor.tls.skipVerify }}{{ end }}"
        {{- if .Values.interceptor.tls.minVersion }}
        - name: KEDA_HTTP_PROXY_TLS_MIN_VERSION
          value: "{{ .Values.interceptor.tls.minVersion }}"
        {{- end }}
        {{- if .Values.interceptor.tls.maxVersion }}
        - name: KEDA_HTTP_PROXY_TLS_MAX_VERSION
          value: "{{ .Values.interceptor.tls.maxVersion }}"
        {{- end }}
        {{- if .Values.interceptor.tls.cipherSuites }}
        - name: KEDA_HTTP_PROXY_TLS_CIPHER_SUITES
          value: "{{ .Values.interceptor.tls.cipherSuites }}"
        {{- end }}
        {{- if .Values.interceptor.tls.curvePreferences }}
        - name: KEDA_HTTP_PROXY_TLS_CURVE_PREFERENCES
          value: "{{ .Values.interceptor.tls.curvePreferences }}"
        {{- end }}
        {{- end }}
        {{- if .Values.profiling.interceptor.enabled }}
        - name: PROFILING_BIND_ADDRESS
          value: "127.0.0.1:{{ .Values.profiling.interceptor.port }}"
        {{- end}}
        {{- range $key, $value := .Values.interceptor.extraEnvs }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.interceptor.admin.port }}
          name: admin
        - containerPort: {{ .Values.interceptor.proxy.port }}
          name: proxy
        {{- if .Values.interceptor.tls.enabled }}
        - containerPort: {{ .Values.interceptor.tls.port }}
          name: proxy-tls
        volumeMounts:
          - readOnly: true
            mountPath: "/certs"
            name: certs
        {{- end }}
        livenessProbe:
          httpGet:
            path: /livez
            port: admin
        readinessProbe:
          httpGet:
            path: /readyz
            port: admin
        resources:
          {{- toYaml .Values.interceptor.resources | nindent 10 }}
        {{- if .Values.securityContext.interceptor }}
        securityContext:
        {{- toYaml .Values.securityContext.interceptor | nindent 10 }}
        {{- else }}
        securityContext:
        {{- toYaml .Values.securityContext | nindent 10 }}
        {{- end }}
      terminationGracePeriodSeconds: 10
      {{- if .Values.interceptor.tls.enabled }}
      volumes:
        - name: certs
          secret:
            secretName: {{ if hasKey .Values.interceptor.tls "cert_secret" }}{{ .Values.interceptor.tls.cert_secret }}{{ else }}{{ .Values.interceptor.tls.certSecret }}{{ end }}
      {{- end }}
      nodeSelector:
        kubernetes.io/os: linux
      {{- with .Values.interceptor.nodeSelector }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.interceptor.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.interceptor.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.interceptor.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.interceptor.priorityClassName }}
      priorityClassName: {{ .Values.interceptor.priorityClassName }}
      {{- end }}
