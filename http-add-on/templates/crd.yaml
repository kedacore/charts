                          name:
                            description: Name of the Kubernetes Service.
                            minLength: 1
                            type: string
                          port:
                            description: Port number on the Service. Mutually exclusive
                              with portName.
                            format: int32
                            maximum: 65535
                            minimum: 1
                            type: integer
                          portName:
                            description: Named port on the Service. Mutually exclusive
                              with port.
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                        x-kubernetes-validations:
                        - message: exactly one of 'port' or 'portName' must be set
                          rule: has(self.port) != has(self.portName)
                    required:
                    - service
                    type: object
                required:
                - fallback
                type: object
                x-kubernetes-validations:
                - message: '''fallback'' must be set'
                  rule: has(self.fallback)
              rules:
                description: Routing rules that define how requests are matched to
                  this target.
                items:
                  description: RoutingRule defines a set of matching criteria for
                    routing requests.
                  properties:
                    headers:
                      description: |-
                        All listed headers must match the request (AND semantics).
                        If a header's Value is omitted, the header must be present but any
                        value is accepted.
                      items:
                        description: HeaderMatch defines a header matching rule.
                        properties:
                          name:
                            description: Name of the HTTP header.
                            minLength: 1
                            type: string
                          value:
                            description: Value to match against (exact match). If
                              omitted, matches any value for given header name.
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                      x-kubernetes-list-map-keys:
                      - name
                      x-kubernetes-list-type: map
                    hosts:
                      description: |-
                        Match any of these hostnames. Wildcard patterns (e.g. "*.example.com")
                        are supported. A single "*" acts as a catch-all. Exact matches take
                        priority over wildcards; more specific wildcards (e.g. "*.bar.example.com")
                        take priority over less specific ones.
                      items:
                        type: string
                      type: array
                      x-kubernetes-list-type: set
                    paths:
                      description: |-
                        Match any of these path prefixes. When multiple paths match,
                        the longest prefix wins.
                      items:
                        description: PathMatch defines a path matching rule.
                        properties:
                          value:
                            description: Path prefix to match against. The longest
                              matching prefix wins.
                            minLength: 1
                            type: string
                        required:
                        - value
                        type: object
                      type: array
                      x-kubernetes-list-type: atomic
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              scalingMetric:
                description: Metric configuration for autoscaling.
                properties:
                  concurrency:
                    description: Scale based on concurrent request count.
                    properties:
                      targetValue:
                        description: Target concurrent request count per replica.
                        format: int32
                        minimum: 1
                        type: integer
                    required:
                    - targetValue
                    type: object
                  requestRate:
                    description: Scale based on request rate.
                    properties:
                      granularity:
                        default: 1s
                        description: Bucket size for rate calculation within the window.
                        type: string
                      targetValue:
                        description: Target request rate per replica.
                        format: int32
                        minimum: 1
                        type: integer
                      window:
                        default: 1m
                        description: Sliding time window over which the request rate
                          is calculated.
                        type: string
                    required:
                    - targetValue
                    type: object
                type: object
                x-kubernetes-validations:
                - message: at least one of 'concurrency' or 'requestRate' must be
                    set
                  rule: has(self.concurrency) || has(self.requestRate)
              target:
                description: Backend service to route traffic to.
                properties:
                  port:
                    description: Port number on the Service. Mutually exclusive with
                      portName.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  portName:
                    description: Named port on the Service. Mutually exclusive with
                      port.
                    minLength: 1
                    type: string
                  service:
                    description: Name of the Kubernetes Service.
                    minLength: 1
                    type: string
                required:
                - service
                type: object
                x-kubernetes-validations:
                - message: exactly one of 'port' or 'portName' must be set
                  rule: has(self.port) != has(self.portName)
              timeouts:
                description: Timeout configuration for request handling.
                properties:
                  readiness:
                    description: |-
                      Time to wait for the backend to become ready (e.g. scale-from-zero).
                      Unset: uses the global KEDA_HTTP_READINESS_TIMEOUT (default: disabled).
                      Set to "0s" to disable the dedicated readiness deadline so the full
                      request budget is available for cold starts. When a fallback service
                      is configured and this is "0s", a 30s default is applied.
                    type: string
                  request:
                    description: |-
                      Total time allowed for the entire request lifecycle.
                      Unset: uses the global KEDA_HTTP_REQUEST_TIMEOUT (default: disabled).
                      Set to "0s" to disable the request deadline.
                    type: string
                  responseHeader:
                    description: |-
                      Max time to wait for the response headers from the backend after the
                      request has been fully sent. Does not include cold-start wait time.
                      Unset: uses the global KEDA_HTTP_RESPONSE_HEADER_TIMEOUT (default: 300s).
                      Set to "0s" to disable the response header deadline.
                    type: string
                type: object
            required:
            - scalingMetric
            - target
            type: object
          status:
            description: InterceptorRouteStatus defines the observed state of InterceptorRoute.
            properties:
              conditions:
                description: Conditions of the InterceptorRoute.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
