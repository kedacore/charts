name: Helm Chart CI (HTTP add-on)
on:
  # Trigger the workflow on push or pull request,
  # but only for the main branch
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci-http-add-on.yml"
      - "http-add-on/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ci-http-add-on.yml"
      - "http-add-on/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  verify-crds:
    name: Verify CRDs are up-to-date
    runs-on: ubuntu-slim
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Verify InterceptorRoute CRD matches source
        run: |
          APP_VERSION=$(yq '.appVersion' http-add-on/Chart.yaml)
          echo "Checking CRDs against http-add-on v${APP_VERSION}"

          curl -sSfL "https://raw.githubusercontent.com/kedacore/http-add-on/v${APP_VERSION}/config/crd/bases/http.keda.sh_interceptorroutes.yaml" \
            -o /tmp/source-interceptorroutes.yaml

          # Strip Helm template guards
          grep -v '^{{' http-add-on/templates/crds/crd-interceptorroutes.yaml > /tmp/chart-interceptorroutes.yaml

          if diff -u /tmp/source-interceptorroutes.yaml /tmp/chart-interceptorroutes.yaml; then
            echo "InterceptorRoute CRD is up-to-date"
          else
            echo "::error::InterceptorRoute CRD is out of sync"
            exit 1
          fi

  lint-helm-3-x:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint 'http-add-on' Helm chart
        run: helm lint http-add-on

  deploy-helm-3-x:
    name: Deploy to Kubernetes ${{ matrix.kubernetesVersion }}
    needs: lint-helm-3-x
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kubernetesVersion: [v1.35, v1.34, v1.33]
        include:
          # Images are defined on every Kind release
          # See https://github.com/kubernetes-sigs/kind/releases
        - kubernetesVersion: v1.35
          kindImage: kindest/node:v1.35.0@sha256:452d707d4862f52530247495d180205e029056831160e22870e37e3f6c1ac31f
        - kubernetesVersion: v1.34
          kindImage: kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48
        - kubernetesVersion: v1.33
          kindImage: kindest/node:v1.33.7@sha256:d26ef333bdb2cbe9862a0f7c3803ecc7b4303d8cea8e814b481b09949d353040
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Helm install
        uses: Azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Create k8s ${{ matrix.kubernetesVersion }} Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: ${{ matrix.kindImage }}

      - name: Show Kubernetes version
        run: |
          kubectl version

      - name: Show Kubernetes nodes
        run: |
          kubectl get nodes -o wide

      - name: Show Helm version
        run: |
          helm version

      - name: Create KEDA namespace
        run: kubectl create ns keda

      - name: Generate values
        run: |
          cat <<EOF > keda-values.yaml
          image:
            keda:
              tag: main
            metricsApiServer:
              tag: main
            webhooks:
              tag: main

      - name: Install KEDA chart
        run: helm install keda ./keda/ --namespace keda --values keda-values.yaml

      - name: Generate values
        run: |
          cat <<EOF > test-values.yaml
          additionalLabels:
            random: value
          images:
            tag: canary
          rbac:
            aggregateToDefaultRoles: true
          operator:
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: "kubernetes.io/hostname"
                whenUnsatisfiable: "ScheduleAnyway"
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: operator
                    app.kubernetes.io/instance: http-add-on
                    app.kubernetes.io/name: http-add-on
          scaler:
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: "kubernetes.io/hostname"
                whenUnsatisfiable: "ScheduleAnyway"
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: operator
                    app.kubernetes.io/instance: http-add-on
                    app.kubernetes.io/name: http-add-on
          interceptor:
            replicas:
              min: 1
            proxy:
              appProtocol: ""
          EOF

      - name: Template Helm chart
        run: helm template http-add-on ./http-add-on/ --namespace keda --values test-values.yaml

      - name: Install Helm chart
        run: helm install http-add-on ./http-add-on/ --namespace keda --values test-values.yaml --wait

      - name: Show Kubernetes resources
        run: kubectl get all --namespace keda
        if: always()

      - name: Get all HTTPScaledObjects
        run: kubectl get httpscaledobjects

      - name: Get all CRDs
        run: kubectl get crds

      - name: Get InterceptorRoute CRD
        run: kubectl get crds/interceptorroutes.http.keda.sh

      - name: Describe InterceptorRoute CRD
        run: kubectl describe crds/interceptorroutes.http.keda.sh

      # TODO: Drop `HTTPScaledObject` specific steps after crd is DEPRECATED
      - name: Get HTTPScaledObject CRD
        run: kubectl get crds/httpscaledobjects.http.keda.sh

      - name: Describe HTTPScaledObject CRD
        run: kubectl describe crds/httpscaledobjects.http.keda.sh

      - name: Validate Interceptor ScaledObject
        run: |
          for N in {1..3}
          do
            READY=$(kubectl get so/keda-add-ons-http-interceptor -n keda -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
            echo "ScaledObjet is ready: $READY"
            if [[ "$READY" == "True" ]]; then            
              exit 0
            fi
            sleep 15s
          done
          exit 1
